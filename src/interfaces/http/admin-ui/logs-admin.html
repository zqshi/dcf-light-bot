<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>后台操作日志</title>
    <link rel="stylesheet" href="/admin/layout.css" />
  </head>
  <body data-required-permission="admin.logs.page.admin.read">
    <div class="admin-shell">
            <aside class="sidebar">
        <h2>管理后台</h2>
        <a href="/admin/openclaw-statistics.html">数据统计</a>
        <a href="/admin/openclaw-monitor.html">平台运营</a>
        <a href="/admin/employees.html">员工管理</a>
        <a href="/admin/shared-agents.html">共享 Agent</a>
        <a href="/admin/skills.html">技能管理</a>
        <a href="/admin/tools.html">工具管理</a>
        <a href="/admin/ai-gateway.html">AI Gateway</a>
        <a href="/admin/notifications.html">通知中心</a>
        <a class="active" href="/admin/logs-service.html">行为日志</a>
        <a href="/admin/auth-members.html">账号权限</a>
      </aside>

      <main class="content">
        <section class="page-head">
          <h1 class="page-title">后台操作日志</h1>
          <p class="page-subtitle">记录账号、权限、审计与后台维护操作，支撑合规审计与责任追踪。</p>
          <div class="stat-strip">
            <div class="stat-item">
              <div class="stat-label">当前页展示条数</div>
              <div id="logCount" class="stat-value">0</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">最新时间</div>
              <div id="latestLogTime" class="stat-value">-</div>
            </div>
          </div>
        </section>

        <section class="card" style="padding:12px 16px;margin-bottom:0;border-bottom:none;border-radius:14px 14px 0 0">
          <div style="display:flex;gap:6px">
            <button class="log-view-btn active" data-log-view="list" style="font-size:13px;padding:5px 16px;border:1px solid #e5e5ea;border-radius:6px;background:#007AFF;color:#fff;cursor:pointer">列表</button>
            <button class="log-view-btn" data-log-view="stats" style="font-size:13px;padding:5px 16px;border:1px solid #e5e5ea;border-radius:6px;background:#fff;color:#333;cursor:pointer">统计</button>
          </div>
        </section>

        <section class="card log-list-panel" style="border-radius:0 0 14px 14px">
          <div class="toolbar filter-toolbar">
            <div class="toolbar-group">
              <label for="logModuleFilter">模块</label>
              <select class="admin-select" id="logModuleFilter">
                <option value="all">全部</option>
              </select>
            </div>
            <div class="toolbar-group">
              <label for="logPageFilter">页面</label>
              <select class="admin-select" id="logPageFilter">
                <option value="all">全部</option>
              </select>
            </div>
            <div class="toolbar-group">
              <label for="logOperationFilter">操作</label>
              <select class="admin-select" id="logOperationFilter">
                <option value="all">全部</option>
              </select>
            </div>
            <div class="toolbar-group">
              <label for="logActorFilter">操作人</label>
              <select class="admin-select" id="logActorFilter">
                <option value="all">全部</option>
              </select>
            </div>
          </div>
          <div class="toolbar" style="justify-content:flex-end;padding-top:0;margin-top:-4px">
            <button type="button" class="btn-secondary" id="btnExportCsv" style="font-size:12px;padding:5px 14px;border:1px solid #e5e5ea;border-radius:6px;background:#fff;cursor:pointer">导出 CSV</button>
            <button type="button" class="btn-secondary" id="btnExportJson" style="font-size:12px;padding:5px 14px;border:1px solid #e5e5ea;border-radius:6px;background:#fff;cursor:pointer">导出 JSON</button>
          </div>
          <p class="toolbar-note">模块按一级菜单、页面按二级菜单、操作按实际行为记录展示；原始 JSON 可在详情中展开查看。</p>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>时间</th>
                  <th>业务模块</th>
                  <th>行为摘要</th>
                  <th>关联对象</th>
                  <th>详情</th>
                </tr>
              </thead>
              <tbody id="rows">
                <tr><td colspan="5" class="empty">加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="card log-stats-panel" style="display:none">
          <div id="logStatsContent">加载中...</div>
        </section>
      </main>
    </div>
    <script src="/admin/auth-core.js?v=20260414"></script>
    <script>
      document.body.setAttribute('data-log-scope', 'admin');
    </script>
    <script src="/admin/logs-stats.js"></script>
    <script src="/admin/logs.js"></script>
  </body>
</html>
