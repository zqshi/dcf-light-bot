<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>数据统计</title>
    <link rel="stylesheet" href="/admin/layout.css" />
    <style>
      /* Override the 2-column page-head-layout from drawer-a — not needed here */
      .page-head-layout {
        grid-template-columns: 1fr !important;
      }
      /* ── Hero strip ── */
      .stats-hero-strip {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 8px;
        margin-top: 12px;
      }
      .stats-hero-card {
        background: #fafafa;
        border: 1px solid #ededf2;
        border-radius: 12px;
        padding: 14px 12px 10px;
        display: flex;
        flex-direction: column;
        transition: border-color 160ms ease, background-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
        cursor: default;
        min-width: 0;
      }
      .stats-hero-card:hover {
        border-color: #d8d8df;
        background: #fff;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
        transform: translateY(-1px);
      }
      .stats-hero-head {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }
      .stats-hero-icon {
        width: 32px;
        height: 32px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .stats-hero-icon svg {
        width: 20px;
        height: 20px;
        stroke-width: 1.8;
        fill: none;
        stroke: currentColor;
      }
      .stats-hero-icon.ic-users  { background: rgba(0,113,227,0.08); color: #0071e3; }
      .stats-hero-icon.ic-wau    { background: rgba(52,199,89,0.10); color: #34c759; }
      .stats-hero-icon.ic-mau    { background: rgba(175,82,222,0.10); color: #af52de; }
      .stats-hero-icon.ic-active { background: rgba(255,149,0,0.10);  color: #ff9500; }
      .stats-hero-icon.ic-token  { background: rgba(255,59,48,0.10);  color: #ff3b30; }
      .stats-hero-icon.ic-cost   { background: rgba(90,200,250,0.12); color: #5ac8fa; }
      .stats-hero-label {
        font-size: 11px;
        color: #8e8e93;
        letter-spacing: 0.02em;
        margin-bottom: 4px;
      }
      .stats-hero-value {
        font-size: 24px;
        font-weight: 700;
        color: #1d1d1f;
        line-height: 1.1;
        font-variant-numeric: tabular-nums;
      }
      .stats-hero-unit {
        font-size: 13px;
        font-weight: 500;
        color: #8e8e93;
        margin-left: 1px;
      }
      .stats-hero-desc {
        font-size: 11px;
        color: #aeaeb2;
        margin-top: 6px;
      }

      /* ── Grids ── */
      .stats-grid-2col {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
        gap: 12px;
      }
      .stats-grid-3col {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 12px;
      }
      .stats-section { margin-bottom: 12px; }

      /* ── Chart Panel ── */
      .chart-panel {
        background: #fff;
        border: 1px solid #ededf2;
        border-radius: 14px;
        padding: 16px 18px 12px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        transition: border-color 180ms ease, box-shadow 180ms ease;
        position: relative;
      }
      .chart-panel:hover {
        border-color: #d8d8df;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
      }
      .chart-panel-title {
        font-size: 13px;
        font-weight: 600;
        color: #1d1d1f;
        margin: 0 0 12px;
      }

      /* ── SVG Chart ── */
      .chart-box {
        position: relative;
        height: 210px;
        padding-left: 40px;
        padding-right: 12px;
      }
      .chart-box.dual-axis { padding-right: 40px; }
      .chart-box svg { width: 100%; height: 100%; display: block; }
      .chart-y-left,
      .chart-y-right {
        position: absolute;
        top: 0;
        bottom: 22px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        font-size: 10px;
        color: #aeaeb2;
        width: 34px;
        pointer-events: none;
      }
      .chart-y-left { left: 0; text-align: right; padding-right: 6px; }
      .chart-y-right { right: 0; text-align: left; padding-left: 6px; }
      .chart-x-axis {
        display: flex;
        justify-content: space-between;
        padding: 4px 0 0 40px;
        font-size: 10px;
        color: #aeaeb2;
      }
      .chart-x-axis.dual-axis { padding-right: 40px; }
      .chart-legend {
        display: flex;
        gap: 16px;
        justify-content: center;
        padding: 10px 0 2px;
      }
      .chart-legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: #6e6e73;
      }
      .legend-swatch {
        width: 14px;
        height: 3px;
        border-radius: 2px;
        flex-shrink: 0;
      }
      .legend-swatch.dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        opacity: 0.35;
      }
      .chart-grid-line { stroke: #f2f2f7; stroke-width: 1; }

      /* ── Tooltip ── */
      .tip {
        position: absolute;
        background: #1d1d1f;
        color: #f5f5f7;
        padding: 8px 12px;
        border-radius: 10px;
        font-size: 11px;
        line-height: 1.6;
        white-space: nowrap;
        pointer-events: none;
        opacity: 0;
        transition: opacity 120ms ease;
        z-index: 20;
        box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      }
      .tip.show { opacity: 1; }
      .tip-label { color: #aeaeb2; font-size: 10px; margin-bottom: 2px; }
      .tip-row { display: flex; align-items: center; gap: 6px; }
      .tip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
      .tip-val { font-weight: 600; }

      /* SVG hit areas */
      .hit-area { fill: transparent; cursor: crosshair; }
      .hit-area:hover ~ .dot-highlight { r: 5; }
      .dot-base { transition: r 120ms ease; }
      .dot-highlight { r: 5; opacity: 0; transition: opacity 120ms ease; }
      .hit-area:hover ~ .dot-highlight { opacity: 1; }

      /* ── Horizontal Bar ── */
      .hbar-list { display: flex; flex-direction: column; gap: 6px; }
      .hbar-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 6px;
        border-radius: 8px;
        transition: background 140ms ease;
      }
      .hbar-item:hover { background: #f5f5f7; }
      .hbar-rank {
        width: 20px;
        height: 20px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
        flex-shrink: 0;
      }
      .hbar-rank.top1 { background: #fef3c7; color: #92400e; }
      .hbar-rank.top2 { background: #f5f5f7; color: #6e6e73; }
      .hbar-rank.top3 { background: #ffedd5; color: #9a3412; }
      .hbar-rank.normal { background: transparent; color: #aeaeb2; }
      .hbar-name {
        width: 72px;
        flex-shrink: 0;
        font-size: 12px;
        font-weight: 550;
        color: #3a3a3c;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .hbar-track {
        flex: 1;
        height: 18px;
        background: #f2f2f7;
        border-radius: 5px;
        overflow: hidden;
      }
      .hbar-fill {
        height: 100%;
        border-radius: 5px;
        transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        min-width: 3px;
        position: relative;
      }
      .hbar-fill::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(90deg, transparent 60%, rgba(255,255,255,0.25));
      }
      .hbar-val {
        width: 48px;
        flex-shrink: 0;
        font-size: 12px;
        font-weight: 650;
        color: #1d1d1f;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      /* ── Period Selector ── */
      .period-selector {
        display: flex;
        gap: 0;
        border: 1px solid #e5e5ea;
        border-radius: 10px;
        overflow: hidden;
        width: fit-content;
        background: #fafafa;
      }
      .period-btn {
        border: none;
        border-right: 1px solid #e5e5ea;
        background: transparent;
        padding: 7px 18px;
        font-size: 13px;
        font-weight: 600;
        color: #6e6e73;
        cursor: pointer;
        border-radius: 0;
        transition: all 160ms ease;
      }
      .period-btn:last-child { border-right: none; }
      .period-btn:hover { transform: none; box-shadow: none; color: #3a3a3c; background: #fff; }
      .period-btn.active {
        background: #0071e3;
        color: #fff;
        box-shadow: 0 2px 8px rgba(0, 113, 227, 0.25);
      }

      /* ── Scrollable ── */
      .scroll-area { max-height: 360px; overflow-y: auto; }
      .scroll-area::-webkit-scrollbar { width: 4px; }
      .scroll-area::-webkit-scrollbar-track { background: transparent; }
      .scroll-area::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 4px; }

      /* ── Entrance animation ── */
      .stats-hero-card,
      .chart-panel {
        animation: cardRise 220ms ease-out both;
      }
      .stats-hero-card:nth-child(2) { animation-delay: 30ms; }
      .stats-hero-card:nth-child(3) { animation-delay: 60ms; }
      .stats-hero-card:nth-child(4) { animation-delay: 90ms; }
      .stats-hero-card:nth-child(5) { animation-delay: 120ms; }
      .stats-hero-card:nth-child(6) { animation-delay: 150ms; }
      .stats-section:nth-child(2) .chart-panel { animation-delay: 80ms; }
      .stats-section:nth-child(3) .chart-panel { animation-delay: 120ms; }
      .stats-section:nth-child(4) .chart-panel { animation-delay: 160ms; }
      .stats-section:nth-child(5) .chart-panel { animation-delay: 200ms; }

      /* ── Responsive ── */
      @media (max-width: 1200px) {
        .stats-hero-strip { grid-template-columns: repeat(3, 1fr); }
      }
      @media (max-width: 768px) {
        .stats-hero-strip { grid-template-columns: repeat(2, 1fr); }
        .stats-grid-2col { grid-template-columns: 1fr; }
        .stats-grid-3col { grid-template-columns: 1fr; }
        .stats-hero-value { font-size: 20px; }
      }
    </style>
  </head>
  <body data-required-permission="admin.runtime.page.openclaw-config.read">
    <div class="admin-shell">
      <aside class="sidebar">
        <h2>管理后台</h2>
        <a href="/admin/index.html">总览</a>
        <a href="/admin/employees.html">员工管理</a>
        <a href="/admin/openclaw-config.html">配置中心</a>
        <a href="/admin/openclaw-monitor.html">平台运营</a>
        <a class="active" href="/admin/openclaw-statistics.html">数据统计</a>
        <a href="/admin/skills.html">技能管理</a>
        <a href="/admin/tools.html">工具管理</a>
        <a href="/admin/logs.html">行为日志</a>
        <a href="/admin/auth-members.html">成员管理</a>
      </aside>
      <main class="content">
        <!-- Page Head -->
        <section class="page-head">
          <div class="page-head-layout">
            <div>
              <div style="display:flex;align-items:center;justify-content:space-between;gap:16px">
                <div style="flex:1;min-width:0">
                  <h1 class="page-title">数据统计</h1>
                  <p class="page-subtitle">全平台使用数据汇总与效能分析。</p>
                </div>
                <div class="period-selector">
                  <button class="period-btn active" data-period="7d">近 7 天</button>
                  <button class="period-btn" data-period="30d">近 30 天</button>
                  <button class="period-btn" data-period="90d">近 90 天</button>
                </div>
              </div>
              <div class="stats-hero-strip">
                <div class="stats-hero-card">
                  <div class="stats-hero-head">
                    <div class="stats-hero-icon ic-users">
                      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    </div>
                  </div>
                  <div class="stats-hero-label">总用户数</div>
                  <div class="stats-hero-value" id="totalUsersValue">71</div>
                  <div class="stats-hero-desc">累计注册用户</div>
                </div>
                <div class="stats-hero-card">
                  <div class="stats-hero-head">
                    <div class="stats-hero-icon ic-wau">
                      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                    </div>
                  </div>
                  <div class="stats-hero-label">活跃用户 WAU</div>
                  <div class="stats-hero-value" id="wauValue">74<span class="stats-hero-unit">%</span></div>
                  <div class="stats-hero-desc">周活跃率</div>
                </div>
                <div class="stats-hero-card">
                  <div class="stats-hero-head">
                    <div class="stats-hero-icon ic-mau">
                      <svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
                    </div>
                  </div>
                  <div class="stats-hero-label">月活跃用户 MAU</div>
                  <div class="stats-hero-value" id="mauValue">76<span class="stats-hero-unit">%</span></div>
                  <div class="stats-hero-desc">月活跃率</div>
                </div>
                <div class="stats-hero-card">
                  <div class="stats-hero-head">
                    <div class="stats-hero-icon ic-active">
                      <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                    </div>
                  </div>
                  <div class="stats-hero-label">日均活跃度</div>
                  <div class="stats-hero-value" id="dailyActiveValue">925.6</div>
                  <div class="stats-hero-desc">日均交互次数</div>
                </div>
                <div class="stats-hero-card">
                  <div class="stats-hero-head">
                    <div class="stats-hero-icon ic-token">
                      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    </div>
                  </div>
                  <div class="stats-hero-label">总 Token 消耗</div>
                  <div class="stats-hero-value" id="totalTokensValue">7,039<span class="stats-hero-unit">K</span></div>
                  <div class="stats-hero-desc">统计周期内累计</div>
                </div>
                <div class="stats-hero-card">
                  <div class="stats-hero-head">
                    <div class="stats-hero-icon ic-cost">
                      <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    </div>
                  </div>
                  <div class="stats-hero-label">日均消耗占比</div>
                  <div class="stats-hero-value" id="dailyTokenPctValue">43.2<span class="stats-hero-unit">%</span></div>
                  <div class="stats-hero-desc">占总量百分比</div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- 趋势 & 留存 -->
        <div class="stats-section stats-grid-2col">
          <div class="chart-panel">
            <div class="chart-panel-title">DAU & 消息量趋势</div>
            <div id="dauMsgChart"></div>
          </div>
          <div class="chart-panel">
            <div class="chart-panel-title">用户留存率趋势</div>
            <div id="retentionChart"></div>
          </div>
        </div>

        <!-- 用户 & 部门分析 -->
        <div class="stats-section stats-grid-3col">
          <div class="chart-panel">
            <div class="chart-panel-title">部门 Token 消耗排行</div>
            <div class="scroll-area" id="deptTokenChart"></div>
          </div>
          <div class="chart-panel">
            <div class="chart-panel-title">用户花费排行 Top 20</div>
            <div class="scroll-area" id="userSpendChart"></div>
          </div>
          <div class="chart-panel">
            <div class="chart-panel-title">活跃用户 Top 20</div>
            <div class="scroll-area" id="activeUserChart"></div>
          </div>
        </div>

        <!-- 性能 & 成本监控 -->
        <div class="stats-section stats-grid-3col">
          <div class="chart-panel">
            <div class="chart-panel-title">响应时长 P50 / P95</div>
            <div id="latencyChart"></div>
          </div>
          <div class="chart-panel">
            <div class="chart-panel-title">错误率 & 超时趋势</div>
            <div id="errorChart"></div>
          </div>
          <div class="chart-panel">
            <div class="chart-panel-title">Token 消耗趋势</div>
            <div id="tokenChart"></div>
          </div>
        </div>
      </main>
    </div>

    <script src="/admin/auth.js"></script>
    <script src="/admin/openclaw-statistics.js"></script>
  </body>
</html>
