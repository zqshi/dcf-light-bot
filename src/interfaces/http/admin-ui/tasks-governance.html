<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>任务治理台账</title>
    <link rel="stylesheet" href="/admin/layout.css" />
  </head>
  <body data-required-permission="admin.tasks.page.governance.read">
    <div class="admin-shell">
      <aside class="sidebar">
        <h2>管理后台</h2>
        <a href="/front.html">用户工作台</a>
      </aside>
      <main class="content">
        <section class="page-head">
          <h1 class="page-title">任务治理台账</h1>
          <p class="page-subtitle">按“发生了什么、为什么发生、如何处置”展示任务治理过程。</p>
          <div class="stat-strip">
            <div class="stat-item">
              <div class="stat-label">需要人工审批</div>
              <div id="approvalTaskCount" class="stat-value">0</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">已触发回滚</div>
              <div id="rollbackCount" class="stat-value">0</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">补偿处理中/排队</div>
              <div id="compensationQueueCount" class="stat-value">0</div>
            </div>
          </div>
        </section>
        <section class="card">
          <div class="toolbar filter-toolbar">
            <div class="toolbar-group">
              <label for="filterIncidentFocus">任务视图</label>
              <select class="admin-select" id="filterIncidentFocus">
                <option value="attention" selected>仅看异常/待处理</option>
                <option value="all">查看全部治理任务</option>
              </select>
            </div>
            <div class="toolbar-group">
              <label for="filterApprovalType">审批类型</label>
              <select class="admin-select" id="filterApprovalType">
                <option value="all">全部</option>
                <option value="manual">需要人工审批</option>
                <option value="auto">自动审批</option>
              </select>
            </div>
            <div class="toolbar-group">
              <label for="filterCompensationStatus">补偿状态</label>
              <select class="admin-select" id="filterCompensationStatus">
                <option value="all">全部</option>
                <option value="queued">排队中</option>
                <option value="running">执行中</option>
                <option value="succeeded">已完成</option>
                <option value="failed">失败</option>
                <option value="dead_letter">死信</option>
                <option value="deferred">待重试</option>
                <option value="none">无补偿动作</option>
              </select>
            </div>
          </div>
          <p class="toolbar-note">术语说明：回滚=撤销已执行结果；补偿=执行反向动作修复业务数据。建议优先看“发生了什么”和“为什么发生”。</p>
          <div class="table-wrap">
            <table class="governance-table">
              <thead>
                <tr>
                  <th>任务编号</th>
                  <th>Trace ID</th>
                  <th>执行人</th>
                  <th>任务概览</th>
                  <th>当前状态</th>
                  <th>风险等级</th>
                  <th>审批进度</th>
                  <th>补偿状态</th>
                  <th>待处理信号</th>
                  <th>最近治理动作</th>
                  <th>责任角色</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="rows">
                <tr><td colspan="12" class="empty">加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="/admin/auth.js"></script>
    <script src="/admin/tasks-governance.js"></script>
  </body>
</html>
