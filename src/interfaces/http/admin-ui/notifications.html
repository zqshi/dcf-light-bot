<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>通知中心</title>
    <link rel="stylesheet" href="/admin/layout.css" />
  </head>
  <body data-required-permission="admin.logs.page.behavior.read">
    <div class="admin-shell">
            <aside class="sidebar">
        <h2>管理后台</h2>
        <a href="/admin/openclaw-statistics.html">数据统计</a>
        <a href="/admin/openclaw-monitor.html">平台运营</a>
        <a href="/admin/employees.html">员工管理</a>
        <a href="/admin/shared-agents.html">共享 Agent</a>
        <a href="/admin/skills.html">技能管理</a>
        <a href="/admin/tools.html">工具管理</a>
        <a href="/admin/ai-gateway.html">AI Gateway</a>
        <a class="active" href="/admin/notifications.html">通知中心</a>
        <a href="/admin/logs-service.html">行为日志</a>
        <a href="/admin/auth-members.html">账号权限</a>
      </aside>

      <main class="content">
        <section class="page-head">
          <h1 class="page-title">通知中心</h1>
          <p class="page-subtitle">统一查看异常实例、审批积压、消息投递失败等需处置事项。</p>
          <div class="stat-strip">
            <div class="stat-item">
              <div class="stat-label">通知总数</div>
              <div id="noticeTotal" class="stat-value">0</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">高优先级</div>
              <div id="noticeHigh" class="stat-value">0</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">中优先级</div>
              <div id="noticeMedium" class="stat-value">0</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">低优先级</div>
              <div id="noticeLow" class="stat-value">0</div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="section-head">
            <h3>待处置列表</h3>
          </div>
          <div id="noticeStatus" class="toolbar-note" style="margin-bottom:10px;"></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>优先级</th>
                  <th>来源</th>
                  <th>标题</th>
                  <th>详情</th>
                  <th>建议动作</th>
                  <th>时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="noticeRows">
                <tr><td colspan="7" class="empty">加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="card" style="margin-top:12px">
          <div class="section-head" style="display:flex;justify-content:space-between;align-items:center">
            <h3>推送渠道配置</h3>
            <button id="btnAddChannel" class="btn-primary" style="font-size:12px;padding:5px 14px">+ 添加渠道</button>
          </div>
          <div id="channelFormArea" style="display:none;margin-bottom:12px;padding:14px;background:#f9f9fb;border-radius:10px;border:1px solid #ededf2">
            <input type="hidden" id="chFormId" value="">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
              <label style="font-size:12px;font-weight:600;color:#6e6e73">名称
                <input id="chFormName" type="text" placeholder="渠道名称" style="width:100%;margin-top:4px;padding:6px 10px;border:1px solid #e5e5ea;border-radius:6px;font-size:13px">
              </label>
              <label style="font-size:12px;font-weight:600;color:#6e6e73">类型
                <select id="chFormType" style="width:100%;margin-top:4px;padding:6px 10px;border:1px solid #e5e5ea;border-radius:6px;font-size:13px">
                  <option value="webhook">Webhook</option>
                  <option value="dingtalk">钉钉</option>
                  <option value="wecom">企业微信</option>
                  <option value="slack">Slack</option>
                  <option value="email">Email</option>
                </select>
              </label>
              <label style="font-size:12px;font-weight:600;color:#6e6e73;grid-column:1/-1">URL
                <input id="chFormUrl" type="text" placeholder="推送地址" style="width:100%;margin-top:4px;padding:6px 10px;border:1px solid #e5e5ea;border-radius:6px;font-size:13px">
              </label>
              <label style="font-size:12px;font-weight:600;color:#6e6e73">密钥（可选）
                <input id="chFormSecret" type="text" placeholder="签名密钥" style="width:100%;margin-top:4px;padding:6px 10px;border:1px solid #e5e5ea;border-radius:6px;font-size:13px">
              </label>
              <div style="font-size:12px;font-weight:600;color:#6e6e73">
                接收级别
                <div style="display:flex;gap:10px;margin-top:6px">
                  <label style="font-weight:400;display:flex;align-items:center;gap:4px"><input type="checkbox" id="chLevelCritical" value="critical"> Critical</label>
                  <label style="font-weight:400;display:flex;align-items:center;gap:4px"><input type="checkbox" id="chLevelWarning" value="warning"> Warning</label>
                  <label style="font-weight:400;display:flex;align-items:center;gap:4px"><input type="checkbox" id="chLevelInfo" value="info"> Info</label>
                </div>
              </div>
              <label style="font-size:12px;font-weight:600;color:#6e6e73;display:flex;align-items:center;gap:6px">
                <input type="checkbox" id="chFormEnabled" checked> 启用
              </label>
            </div>
            <div style="display:flex;gap:8px;margin-top:12px">
              <button id="btnSaveChannel" class="btn-primary" style="font-size:12px;padding:5px 14px">保存</button>
              <button id="btnCancelChannel" style="font-size:12px;padding:5px 14px;border:1px solid #e5e5ea;border-radius:6px;background:#fff;cursor:pointer">取消</button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>名称</th>
                  <th>类型</th>
                  <th>URL</th>
                  <th>启用</th>
                  <th>接收级别</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="channelRows">
                <tr><td colspan="6" class="empty">加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="card" style="margin-top:12px">
          <details id="dismissedSection">
            <summary style="cursor:pointer;font-size:14px;font-weight:600;color:#6e6e73;padding:8px 0">
              已处理的通知 (<span id="dismissedCount">0</span>)
            </summary>
            <div class="table-wrap" style="margin-top:8px">
              <table>
                <thead>
                  <tr>
                    <th>优先级</th>
                    <th>来源</th>
                    <th>标题</th>
                    <th>状态</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="dismissedRows">
                  <tr><td colspan="5" class="empty">暂无已处理通知</td></tr>
                </tbody>
              </table>
            </div>
          </details>
        </section>
      </main>
    </div>
    <script src="/admin/auth-core.js?v=20260414"></script>
    <script src="/admin/notifications.js"></script>
  </body>
</html>
