<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>DCF Light Bot 管理后台</title>
    <link rel="stylesheet" href="/admin/layout.css" />
  </head>
  <body data-required-permission="admin.runtime.page.platform-overview.read" data-hide-content-topbar="1">
    <div class="admin-shell">
      <aside class="sidebar">
        <h2>管理后台</h2>
        <a class="active" href="/admin/index.html">总览</a>
        <a href="/admin/employees.html">员工管理</a>
        <a href="/admin/skills.html">技能管理</a>
        <a href="/admin/tools.html">工具管理</a>
        <a href="/admin/logs.html">行为日志</a>
        <a href="/admin/auth-members.html">成员管理</a>
      </aside>
      <main class="content">
        <section class="page-head">
          <div class="page-head-layout">
            <div>
              <h1 class="page-title">后台总览</h1>
              <p class="page-subtitle">基于当前系统真实能力展示实例运营、共享资产、审计与权限态势。</p>
              <div class="stat-strip">
                <div class="stat-item">
                  <div class="stat-label">实例总数</div>
                  <div id="instancesTotal" class="stat-value">0</div>
                </div>
                <div class="stat-item">
                  <div class="stat-label">运行中</div>
                  <div id="instancesRunning" class="stat-value">0</div>
                </div>
                <div class="stat-item">
                  <div class="stat-label">异常实例</div>
                  <div id="instancesAbnormal" class="stat-value">0</div>
                </div>
                <div class="stat-item">
                  <div class="stat-label">待审资产</div>
                  <div id="pendingReviewsTotal" class="stat-value">0</div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="section-head">
            <h3>平台运营全景</h3>
          </div>
          <div class="panel-grid-2">
            <div class="list-panel">
              <div id="summary" class="overview-summary">加载中...</div>
              <div class="overview-kpis">
                <div><span>租户数</span><strong id="tenantCount">0</strong></div>
                <div><span>共享资产</span><strong id="sharedAssetsTotal">0</strong></div>
                <div><span>24h 审计事件</span><strong id="audit24hTotal">0</strong></div>
                <div><span>账号数</span><strong id="usersTotal">0</strong></div>
              </div>
            </div>
            <div class="list-panel">
              <div id="statusHeadline" class="overview-summary">加载中...</div>
              <div class="overview-list" id="opsChecklist"></div>
            </div>
          </div>
        </section>

        <section class="overview-grid">
          <article class="card">
            <h3>运营健康</h3>
            <div class="overview-list" id="qualityList"></div>
          </article>

          <article class="card">
            <h3>处置建议</h3>
            <div class="overview-list" id="focusList"></div>
          </article>
        </section>

        <section class="card">
          <div class="section-head">
            <h3>功能完备度检查</h3>
          </div>
          <div id="completenessSummary" class="overview-summary">检查中...</div>
          <div id="completenessList" class="overview-list"></div>
        </section>
      </main>
    </div>
    <script src="/admin/auth.js"></script>
    <script src="/admin/index.js"></script>
  </body>
</html>
