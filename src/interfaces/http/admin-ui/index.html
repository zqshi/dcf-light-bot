<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DCF 管理后台</title>
    <link rel="stylesheet" href="/admin/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <h1>DCF Light Bot 管理后台</h1>
        <div class="session">
          <span id="session-user">未登录</span>
          <button id="btn-logout" class="ghost" type="button">退出</button>
        </div>
      </header>

      <section id="login-card" class="card">
        <h2>登录</h2>
        <form id="login-form">
          <label>
            用户名
            <input id="username" required value="admin" />
          </label>
          <label>
            密码
            <input id="password" type="password" required value="admin123" />
          </label>
          <button type="submit">登录</button>
        </form>
      </section>

      <section id="dashboard" class="grid hidden">
        <article class="card kpi">
          <h3>平台健康</h3>
          <p id="health-level" class="metric">-</p>
          <p id="status-summary" class="muted"></p>
        </article>
        <article class="card kpi">
          <h3>实例数</h3>
          <p id="instance-total" class="metric">0</p>
        </article>
        <article class="card kpi">
          <h3>待审资产</h3>
          <p id="pending-total" class="metric">0</p>
        </article>
        <article class="card kpi">
          <h3>Preflight</h3>
          <p id="preflight-ok" class="metric">-</p>
        </article>
      </section>

      <section id="workspace" class="hidden">
        <div class="tabs">
          <button class="tab active" data-tab="instances" type="button">员工实例</button>
          <button class="tab" data-tab="assets" type="button">技能/工具/知识</button>
          <button class="tab" data-tab="audits" type="button">审计日志</button>
          <button class="tab" data-tab="release" type="button">发布预检</button>
        </div>

        <article id="tab-instances" class="card tab-panel active">
          <div class="panel-head">
            <h3>员工实例</h3>
            <button id="btn-refresh-instances" type="button">刷新</button>
          </div>
          <form id="instance-create-form" class="inline-form">
            <label>实例名<input id="instance-name" required placeholder="alice-agent" /></label>
            <label>创建人<input id="instance-creator" value="admin-ui" /></label>
            <label>矩阵房间<input id="instance-room" placeholder="!room:matrix.org" /></label>
            <button type="submit">创建实例</button>
          </form>
          <form id="instance-action-form" class="inline-form">
            <label>实例ID<input id="instance-action-id" required placeholder="inst_xxx" /></label>
            <button id="btn-instance-start" type="button">启动</button>
            <button id="btn-instance-stop" class="ghost" type="button">停止</button>
          </form>
          <table>
            <thead><tr><th>ID</th><th>租户</th><th>状态</th><th>运行版本</th><th>更新时间</th><th>操作</th></tr></thead>
            <tbody id="instances-table"></tbody>
          </table>
        </article>

        <article id="tab-assets" class="card tab-panel">
          <div class="panel-head">
            <h3>共享资产</h3>
            <button id="btn-refresh-assets" type="button">刷新</button>
          </div>
          <form id="asset-review-form" class="inline-form">
            <label>报告ID<input id="review-report-id" required placeholder="rep_xxx" /></label>
            <label>审核动作
              <select id="review-decision">
                <option value="approve">approve</option>
                <option value="reject">reject</option>
              </select>
            </label>
            <label>意见<input id="review-opinion" placeholder="looks good" /></label>
            <button type="submit">提交审核</button>
          </form>
          <form id="asset-bind-form" class="inline-form">
            <label>租户ID<input id="bind-tenant-id" required placeholder="tenant_xxx" /></label>
            <label>资产ID<input id="bind-asset-id" required placeholder="asset_xxx" /></label>
            <label>资产类型
              <select id="bind-asset-type">
                <option value="skill">skill</option>
                <option value="tool">tool</option>
                <option value="knowledge">knowledge</option>
              </select>
            </label>
            <button type="submit">绑定资产</button>
          </form>
          <div class="split">
            <div>
              <h4>已共享</h4>
              <ul id="shared-assets"></ul>
            </div>
            <div>
              <h4>待审核</h4>
              <ul id="pending-assets"></ul>
            </div>
          </div>
        </article>

        <article id="tab-audits" class="card tab-panel">
          <div class="panel-head">
            <h3>审计日志</h3>
            <div>
              <button id="btn-refresh-audits" type="button">刷新</button>
              <button id="btn-audit-prev" class="ghost" type="button">上一页</button>
              <button id="btn-audit-next" class="ghost" type="button">下一页</button>
              <button id="btn-audit-export" type="button">导出NDJSON</button>
            </div>
          </div>
          <form id="audit-filter-form" class="inline-form">
            <label>类型<input id="audit-type" placeholder="instance.provisioned" /></label>
            <label>操作者<input id="audit-actor" placeholder="admin" /></label>
            <button type="submit">查询</button>
          </form>
          <p id="audit-page-info" class="muted">cursor=0</p>
          <ul id="audit-list"></ul>
        </article>

        <article id="tab-release" class="card tab-panel">
          <div class="panel-head">
            <h3>发布预检</h3>
            <div>
              <button id="btn-refresh-release" type="button">刷新</button>
              <button id="btn-assert-release" type="button">Assert</button>
            </div>
          </div>
          <ul id="release-failures" class="fail-list"></ul>
          <pre id="release-json" class="json"></pre>
        </article>
      </section>

      <p id="toast" class="toast"></p>
    </main>
    <script src="/admin/app.js"></script>
  </body>
</html>
