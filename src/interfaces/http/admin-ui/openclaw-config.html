<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>OpenClaw 配置中心</title>
    <link rel="stylesheet" href="/admin/layout.css" />
  </head>
  <body data-required-permission="admin.runtime.page.openclaw-config.read">
    <div class="admin-shell">
      <aside class="sidebar">
        <h2>管理后台</h2>
        <a href="/admin/index.html">总览</a>
        <a href="/admin/employees.html">员工管理</a>
        <a class="active" href="/admin/openclaw-config.html">OpenClaw 配置</a>
        <a href="/admin/skills.html">技能管理</a>
        <a href="/admin/tools.html">工具管理</a>
        <a href="/admin/logs.html">行为日志</a>
        <a href="/admin/auth-members.html">成员管理</a>
      </aside>
      <main class="content">
        <section class="page-head">
          <h1 class="page-title">OpenClaw 配置中心</h1>
          <p class="page-subtitle">统一维护模型凭据、运行版本与默认权限模板。用户侧无需填写 API Key。</p>
          <div class="stat-strip">
            <div class="stat-item">
              <div class="stat-label">运行镜像</div>
              <div id="openclawImageStat" class="stat-value">-</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">运行版本</div>
              <div id="runtimeVersionStat" class="stat-value">-</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">启用 Provider</div>
              <div id="providerCountStat" class="stat-value">0</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">最后更新</div>
              <div id="updatedAtStat" class="stat-value">-</div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="section-head">
            <h3>运行时配置</h3>
          </div>
          <div class="policy-grid">
            <div>
              <label for="openclawImageInput">OpenClaw 镜像</label>
              <input id="openclawImageInput" type="text" />
            </div>
            <div>
              <label for="runtimeVersionInput">OpenClaw 版本</label>
              <input id="runtimeVersionInput" type="text" />
            </div>
            <div style="grid-column:1 / span 2;">
              <label for="openclawSourcePathInput">锁定源码路径</label>
              <input id="openclawSourcePathInput" type="text" />
            </div>
          </div>
        </section>

        <section class="card">
          <div class="section-head">
            <h3>模型 Provider 凭据</h3>
          </div>
          <div class="policy-grid">
            <div>
              <label><input id="deepseekEnabled" type="checkbox" /> DeepSeek 启用</label>
            </div>
            <div>
              <label for="deepseekModel">DeepSeek 模型</label>
              <input id="deepseekModel" type="text" />
            </div>
            <div>
              <label for="deepseekApiBase">DeepSeek API Base</label>
              <input id="deepseekApiBase" type="text" />
            </div>
            <div>
              <label for="deepseekApiKey">DeepSeek API Key（留空表示不变）</label>
              <input id="deepseekApiKey" type="password" autocomplete="off" />
              <div id="deepseekMasked" class="toolbar-note"></div>
            </div>
            <div>
              <label><input id="minimaxEnabled" type="checkbox" /> MiniMax 启用</label>
            </div>
            <div>
              <label for="minimaxModel">MiniMax 模型</label>
              <input id="minimaxModel" type="text" />
            </div>
            <div>
              <label for="minimaxApiBase">MiniMax API Base</label>
              <input id="minimaxApiBase" type="text" />
            </div>
            <div>
              <label for="minimaxApiKey">MiniMax API Key（留空表示不变）</label>
              <input id="minimaxApiKey" type="password" autocomplete="off" />
              <div id="minimaxMasked" class="toolbar-note"></div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="section-head">
            <h3>默认权限模板</h3>
          </div>
          <div class="policy-grid">
            <div style="grid-column:1 / span 2;">
              <label for="commandAllowlistInput">默认命令白名单（每行一个）</label>
              <textarea id="commandAllowlistInput" class="policy-editor policy-editor-sm"></textarea>
            </div>
            <div style="grid-column:1 / span 2;">
              <label for="approvalByRiskInput">默认审批模板（JSON）</label>
              <textarea id="approvalByRiskInput" class="policy-editor policy-editor-sm"></textarea>
            </div>
          </div>
          <div class="employee-edit-actions" style="justify-content:flex-start;">
            <button id="saveOpenClawConfigBtn" type="button" class="primary" data-required-permission="admin.runtime.action.openclaw-config.write">保存配置</button>
            <button id="reloadOpenClawConfigBtn" type="button">重新加载</button>
          </div>
          <div id="openclawConfigStatus" class="toolbar-note" style="margin-top:10px;"></div>
        </section>
      </main>
    </div>
    <script src="/admin/auth.js"></script>
    <script src="/admin/openclaw-config.js"></script>
  </body>
</html>
