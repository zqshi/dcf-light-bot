<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Agent 行为日志</title>
    <link rel="stylesheet" href="/admin/layout.css" />
  </head>
  <body data-required-permission="admin.logs.page.agent.read">
    <div class="admin-shell">
      <aside class="sidebar">
        <h2>管理后台</h2>
        <a href="/admin/index.html">总览</a>
        <a href="/admin/employees.html">员工管理</a>
        <a href="/admin/skills.html">技能管理</a>
        <a href="/admin/tools.html">工具管理</a>
        <a class="active" href="/admin/logs-agent.html">Agent 行为日志</a>
        <a href="/admin/auth-members.html">成员管理</a>
      </aside>
      <main class="content">
        <section class="page-head">
          <h1 class="page-title">Agent 行为日志</h1>
          <p class="page-subtitle">记录任务执行链路与运行时事件，支持排障复盘与能力追踪。</p>
          <div class="stat-strip">
            <div class="stat-item">
              <div class="stat-label">当前页展示条数</div>
              <div id="logCount" class="stat-value">0</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">最新时间</div>
              <div id="latestLogTime" class="stat-value">-</div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="toolbar filter-toolbar">
            <div class="toolbar-group">
              <label for="logOperationFilter">操作</label>
              <select class="admin-select" id="logOperationFilter">
                <option value="all">全部</option>
              </select>
            </div>
          </div>
          <p class="toolbar-note">按 Agent 实际发生的行为操作筛选，点击“查看原始数据”可展开完整 JSON。</p>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>时间</th>
                  <th>业务模块</th>
                  <th>行为摘要</th>
                  <th>关联对象</th>
                  <th>详情</th>
                </tr>
              </thead>
              <tbody id="rows">
                <tr><td colspan="5" class="empty">加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="/admin/auth.js"></script>
    <script>
      document.body.setAttribute('data-log-scope', 'agent');
    </script>
    <script src="/admin/logs.js"></script>
  </body>
</html>
