<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>渠道健康</title>
    <link rel="stylesheet" href="/admin/layout.css" />
  </head>
  <body data-required-permission="admin.employees.page.overview.read">
    <div class="admin-shell">
      <aside class="sidebar">
        <h2>管理后台</h2>
        <a href="/admin/index.html">总览</a>
        <a href="/admin/employees.html">员工管理</a>
        <a class="active" href="/admin/matrix-channels.html">渠道健康</a>
        <a href="/admin/skills.html">技能管理</a>
        <a href="/admin/tools.html">工具管理</a>
        <a href="/admin/logs.html">行为日志</a>
        <a href="/admin/auth-members.html">成员管理</a>
      </aside>
      <main class="content">
        <section class="page-head">
          <h1 class="page-title">Matrix 渠道健康</h1>
          <p class="page-subtitle">员工与会话通道采用系统固定映射，后台仅做状态观测、投递质量监控与审计追踪。</p>
          <div class="stat-strip">
            <div class="stat-item">
              <div class="stat-label">会话通道</div>
              <div id="channelCount" class="stat-value">0</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">已映射</div>
              <div id="boundCount" class="stat-value">0</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">未映射</div>
              <div id="unboundCount" class="stat-value">0</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">24h 事件</div>
              <div id="events24h" class="stat-value">0</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Bot 状态</div>
              <div id="botOnline" class="stat-value">-</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">投递成功率</div>
              <div id="deliveryRate" class="stat-value">0%</div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="section-head">
            <h3>固定会话映射（只读）</h3>
          </div>
          <div class="toolbar filter-toolbar">
            <div class="toolbar-group">
              <label for="channelKeyword">搜索</label>
              <input class="admin-input" id="channelKeyword" type="text" placeholder="会话ID/实例ID/租户" />
            </div>
            <div class="toolbar-group">
              <label for="channelStatus">状态</label>
              <select class="admin-select" id="channelStatus">
                <option value="">全部</option>
                <option value="bound">已映射</option>
                <option value="unbound">未映射</option>
              </select>
            </div>
          </div>
          <div class="toolbar-note" style="margin-bottom:6px;">说明：会话映射由系统自动维护，不提供手工配置房间入口。</div>
          <div id="channelStatusText" class="toolbar-note" style="margin-bottom:10px;"></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>会话ID</th>
                  <th>映射实例</th>
                  <th>租户</th>
                  <th>实例状态</th>
                  <th>24h 事件</th>
                  <th>最近事件时间</th>
                </tr>
              </thead>
              <tbody id="channelRows">
                <tr><td colspan="6" class="empty">加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="/admin/auth.js"></script>
    <script src="/admin/matrix-channels.js"></script>
  </body>
</html>
