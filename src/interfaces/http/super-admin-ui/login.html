<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录 - 租户运营平台</title>
<link rel="stylesheet" href="/admin/layout-base.css">
<style>
  body {
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    font-family: "Outfit", "PingFang SC", "Microsoft YaHei", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .login-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 20px;
    box-shadow: 0 18px 34px rgba(15, 23, 42, 0.09);
    padding: 40px 36px;
    width: 380px;
    animation: cardRise 320ms ease-out both;
  }
  @keyframes cardRise {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .login-logo {
    width: 52px; height: 52px;
    margin: 0 auto 16px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 14px;
    border: 1px solid rgba(99,102,241,0.2);
    background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(20,184,166,0.1));
    box-shadow: 0 8px 16px rgba(99,102,241,0.12);
  }
  .login-logo svg { width: 26px; height: 26px; }
  .login-card h1 {
    font-size: 22px; font-weight: 600; text-align: center;
    margin: 0 0 4px; color: var(--text);
  }
  .login-card .subtitle {
    font-size: 13px; color: var(--text-soft); text-align: center; margin-bottom: 28px;
  }
  .login-card label {
    display: block; font-size: 13px; color: var(--text-soft); margin-bottom: 4px;
  }
  .login-card input {
    width: 100%; box-sizing: border-box;
    padding: 10px 12px; border: 1px solid var(--line-2);
    border-radius: 10px; font-size: 14px; margin-bottom: 16px;
    outline: none; background: #fff; color: var(--text);
    transition: border-color 140ms ease, box-shadow 140ms ease;
  }
  .login-card input:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.16);
  }
  .login-card button {
    width: 100%; padding: 11px;
    background: #6366f1; color: #fff; border: none;
    border-radius: 10px; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: background 140ms ease;
  }
  .login-card button:hover { background: #4f46e5; }
  .login-card .error {
    color: #dc2626; font-size: 13px; text-align: center;
    min-height: 20px; margin-bottom: 8px;
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo" aria-hidden="true">
    <svg viewBox="0 0 72 72" focusable="false">
      <defs>
        <linearGradient id="spGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#6366f1"></stop>
          <stop offset="100%" stop-color="#14b8a6"></stop>
        </linearGradient>
      </defs>
      <circle cx="36" cy="36" r="30" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.24)" stroke-width="1.5"></circle>
      <path d="M22 40 L32 26 L42 36 L52 22" fill="none" stroke="url(#spGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></path>
      <circle cx="22" cy="40" r="4.5" fill="#6366f1"></circle>
      <circle cx="32" cy="26" r="4.5" fill="#4f46e5"></circle>
      <circle cx="42" cy="36" r="4.5" fill="#0ea5e9"></circle>
      <circle cx="52" cy="22" r="4.5" fill="#14b8a6"></circle>
    </svg>
  </div>
  <h1>租户运营平台</h1>
  <p class="subtitle">Digital Crew Factory — 平台管理控制台</p>
  <div class="error" id="errorMsg"></div>
  <form id="loginForm" autocomplete="off">
    <label for="username">用户名</label>
    <input type="text" id="username" name="username" required autofocus placeholder="请输入平台管理员账号">
    <label for="password">密码</label>
    <input type="password" id="password" name="password" required placeholder="请输入密码">
    <button type="submit">登录</button>
  </form>
</div>
<script src="login.js"></script>
</body>
</html>
