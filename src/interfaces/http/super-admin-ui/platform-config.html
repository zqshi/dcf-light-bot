<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>全局配置 - 租户运营平台</title>
<link rel="stylesheet" href="/admin/layout-base.css">
<link rel="stylesheet" href="/admin/layout-extra.css">
<link rel="stylesheet" href="/super-admin/super-admin-base.css">
<style>
.cfg-field {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 0;
  border-bottom: 1px solid var(--line);
  font-size: 13px;
}
.cfg-field:last-child { border-bottom: none; }
.cfg-label { color: var(--text-soft); min-width: 140px; }
.cfg-val { font-weight: 600; color: var(--text); }
.cfg-val .source-chip {
  display: inline-block;
  font-size: 10px;
  font-weight: 500;
  padding: 1px 6px;
  border-radius: 4px;
  margin-left: 6px;
  vertical-align: middle;
}
.source-chip.env { background: #e8f0fe; color: #3b6dd8; }
.source-chip.override { background: #dcf9eb; color: #136140; }
.cfg-edit-row { display: none; }
.cfg-section.editing .cfg-val { display: none; }
.cfg-section.editing .cfg-edit-row { display: block; }
.cfg-edit-row input,
.cfg-edit-row select {
  width: 100%;
  max-width: 240px;
  padding: 5px 8px;
  font-size: 13px;
}
.cfg-actions {
  display: none;
  padding-top: 10px;
  gap: 8px;
  justify-content: flex-end;
}
.cfg-section.editing .cfg-actions { display: flex; }
</style>
</head>
<body>
<div class="admin-shell">
  <aside class="sidebar"></aside>
  <main class="content">
    <section class="page-head">
      <div class="page-head-layout">
        <div>
          <h1 class="page-title">全局配置</h1>
          <p class="page-subtitle">平台级运行参数、模型 Provider、资源默认值与审计策略</p>
        </div>
      </div>
    </section>

    <!-- 模型 Provider -->
    <section class="card">
      <div class="section-head">
        <h3>模型 Provider</h3>
        <p class="section-note">通过环境变量配置 API Key，运行时只读</p>
      </div>
      <div id="providerGrid" class="stat-strip" style="grid-template-columns:repeat(auto-fill,minmax(180px,1fr));">
        <div class="stat-item"><div class="stat-label">加载中...</div><div class="stat-value">-</div></div>
      </div>
    </section>

    <!-- 资源默认值 -->
    <section class="card cfg-section" data-section="resourceDefaults">
      <div class="section-head">
        <h3>租户资源默认值</h3>
        <button type="button" class="btn-link cfg-edit-btn" data-section="resourceDefaults">编辑</button>
      </div>
      <div id="resourceBody" class="cfg-body"></div>
      <div class="cfg-actions">
        <button type="button" class="cfg-cancel-btn">取消</button>
        <button type="button" class="primary cfg-save-btn">保存</button>
      </div>
    </section>

    <!-- 审计策略 -->
    <section class="card cfg-section" data-section="audit">
      <div class="section-head">
        <h3>审计策略</h3>
        <button type="button" class="btn-link cfg-edit-btn" data-section="audit">编辑</button>
      </div>
      <div id="auditBody" class="cfg-body"></div>
      <div class="cfg-actions">
        <button type="button" class="cfg-cancel-btn">取消</button>
        <button type="button" class="primary cfg-save-btn">保存</button>
      </div>
    </section>

    <!-- 资产审核 SLA -->
    <section class="card cfg-section" data-section="assetReview">
      <div class="section-head">
        <h3>资产审核 SLA</h3>
        <button type="button" class="btn-link cfg-edit-btn" data-section="assetReview">编辑</button>
      </div>
      <div id="slaBody" class="cfg-body"></div>
      <div class="cfg-actions">
        <button type="button" class="cfg-cancel-btn">取消</button>
        <button type="button" class="primary cfg-save-btn">保存</button>
      </div>
    </section>

    <!-- 运行时 (只读) -->
    <section class="card">
      <div class="section-head">
        <h3>运行时配置</h3>
        <p class="section-note">运维级别，需重启服务生效</p>
      </div>
      <div id="runtimeBody" class="cfg-body"></div>
    </section>

    <!-- 平台参数 -->
    <section class="card cfg-section" data-section="platform">
      <div class="section-head">
        <h3>平台参数</h3>
        <button type="button" class="btn-link cfg-edit-btn" data-section="platform">编辑</button>
      </div>
      <div id="platformBody" class="cfg-body"></div>
      <div class="cfg-actions">
        <button type="button" class="cfg-cancel-btn">取消</button>
        <button type="button" class="primary cfg-save-btn">保存</button>
      </div>
    </section>
  </main>
</div>
<script src="super-auth-core.js"></script>
<script src="platform-config.js"></script>
</body>
</html>
