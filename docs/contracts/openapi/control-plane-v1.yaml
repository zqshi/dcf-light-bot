openapi: 3.0.3
info:
  title: DCF Light Bot Control Plane API
  version: 1.7.0
paths:
  /health:
    get:
      summary: Health probe
  /status:
    get:
      summary: Runtime status summary
  /api/integrations/matrix/commands:
    post:
      summary: Receive matrix command webhook
      parameters:
        - in: header
          name: x-matrix-webhook-secret
          schema: { type: string }
  /api/control/auth/login:
    post:
      summary: Login and issue control-plane JWT
  /api/control/auth/me:
    get:
      summary: Get current principal
  /api/control/instances:
    get:
      summary: List instances
      parameters:
        - in: header
          name: Authorization
          schema: { type: string }
    post:
      summary: Create instance
  /api/control/instances/{instanceId}:
    get:
      summary: Get instance
  /api/control/instances/{instanceId}/start:
    post:
      summary: Start instance
  /api/control/instances/{instanceId}/stop:
    post:
      summary: Stop instance
  /api/control/skills/reports:
    post:
      summary: Report skill from tenant runtime
    get:
      summary: List skill reports
  /api/control/skills/reports/{reportId}/approve:
    post:
      summary: Approve skill report and publish shared skill
  /api/control/skills/reports/{reportId}/reject:
    post:
      summary: Reject skill report
  /api/control/skills/shared:
    get:
      summary: List shared skills
  /api/control/skills/bindings:
    post:
      summary: Bind shared skill to tenant
    get:
      summary: List bindings
  /api/control/assets/reports:
    post:
      summary: Report tenant asset (skill/tool/knowledge)
    get:
      summary: List tenant asset reports
  /api/control/assets/reports/{reportId}/approve:
    post:
      summary: Approve asset report and publish shared asset
  /api/control/assets/reports/{reportId}/reject:
    post:
      summary: Reject asset report
  /api/control/assets/shared:
    get:
      summary: List shared assets by type
  /api/control/assets/bindings:
    post:
      summary: Bind shared asset to tenant
    get:
      summary: List asset bindings by type
  /api/control/runtime/instances/{instanceId}/invoke:
    post:
      summary: Invoke tenant runtime through control-plane proxy
  /api/control/audits:
    get:
      summary: List audit logs with cursor pagination and incremental filters
  /api/control/audits/export:
    get:
      summary: Export audit logs (json or ndjson) with incremental filters
