global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/prometheus-alert-rules.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: dcf-light-bot
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:3000
        labels:
          service: dcf-light-bot
