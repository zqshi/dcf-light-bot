<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7b00ff",
                        "background-light": "#f7f5f8",
                        "background-dark": "#190f23",
                        "surface-light": "rgba(255, 255, 255, 0.7)",
                        "surface-dark": "rgba(30, 20, 45, 0.7)",
                    },
                    fontFamily: {
                        "display": ["Inter", "SF Pro Display", "PingFang SC", "system-ui", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', 'SF Pro Display', 'PingFang SC', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .glass-panel {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4 md:p-10">
<!-- Main Container (Mac-style Modal) -->
<div class="w-full max-w-[800px] h-[85vh] flex flex-col bg-white/80 dark:bg-slate-900/80 border border-slate-200 dark:border-slate-800 rounded-xl shadow-2xl glass-panel overflow-hidden">
<!-- Header -->
<header class="flex items-center justify-between px-8 py-6 border-b border-slate-200 dark:border-slate-800 shrink-0">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-2xl">settings_suggest</span>
<h1 class="text-xl font-semibold text-slate-900 dark:text-slate-100">订阅设置</h1>
</div>
<div class="flex items-center gap-3">
<button class="px-4 py-1.5 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">取消</button>
<button class="px-6 py-1.5 rounded-lg text-sm font-semibold bg-primary text-white shadow-lg shadow-primary/25 hover:bg-primary/90 transition-all">保存更改</button>
</div>
</header>
<!-- Content Area -->
<div class="flex-1 overflow-y-auto custom-scrollbar p-8 space-y-10">
<!-- Section 1: Data Sources & Themes -->
<section>
<div class="flex items-center justify-between mb-4">
<h2 class="text-sm font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">数据源与订阅主题</h2>
<button class="flex items-center gap-1 text-xs font-semibold text-primary hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-sm">add</span>
                        添加新主题
                    </button>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-3">
<!-- Theme Card 1 -->
<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-800/50 border border-slate-100 dark:border-slate-700 rounded-lg shadow-sm">
<div class="flex items-center gap-3">
<div class="size-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">flight_takeoff</span>
</div>
<div>
<p class="text-sm font-medium text-slate-800 dark:text-slate-200">低空经济</p>
<p class="text-xs text-slate-500">来源: 行业动态, 投融资</p>
</div>
</div>
<label class="relative flex h-[24px] w-[44px] cursor-pointer items-center rounded-full bg-primary p-0.5 justify-end">
<div class="h-full w-[20px] rounded-full bg-white shadow-sm"></div>
<input checked="" class="hidden" type="checkbox"/>
</label>
</div>
<!-- Theme Card 2 -->
<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-800/50 border border-slate-100 dark:border-slate-700 rounded-lg shadow-sm">
<div class="flex items-center gap-3">
<div class="size-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">memory</span>
</div>
<div>
<p class="text-sm font-medium text-slate-800 dark:text-slate-200">AI 手机市场</p>
<p class="text-xs text-slate-500">来源: 科技新闻, 供应链</p>
</div>
</div>
<label class="relative flex h-[24px] w-[44px] cursor-pointer items-center rounded-full bg-primary p-0.5 justify-end">
<div class="h-full w-[20px] rounded-full bg-white shadow-sm"></div>
<input checked="" class="hidden" type="checkbox"/>
</label>
</div>
<!-- Theme Card 3 -->
<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-800/50 border border-slate-100 dark:border-slate-700 rounded-lg shadow-sm">
<div class="flex items-center gap-3">
<div class="size-10 rounded-lg bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-400">
<span class="material-symbols-outlined">precision_manufacturing</span>
</div>
<div>
<p class="text-sm font-medium text-slate-800 dark:text-slate-200">智能制造</p>
<p class="text-xs text-slate-500">来源: 政策解读</p>
</div>
</div>
<label class="relative flex h-[24px] w-[44px] cursor-pointer items-center rounded-full bg-slate-200 dark:bg-slate-700 p-0.5 justify-start">
<div class="h-full w-[20px] rounded-full bg-white shadow-sm"></div>
<input class="hidden" type="checkbox"/>
</label>
</div>
</div>
</section>
<!-- Section 2: Delivery Frequency -->
<section>
<h2 class="text-sm font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-4">投递频率</h2>
<div class="bg-white dark:bg-slate-800/50 border border-slate-100 dark:border-slate-700 rounded-lg divide-y divide-slate-100 dark:divide-slate-700 shadow-sm">
<label class="flex items-center justify-between p-4 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-400">bolt</span>
<div>
<p class="text-sm font-medium text-slate-800 dark:text-slate-200">实时推送</p>
<p class="text-xs text-slate-500">检测到新内容立即发送</p>
</div>
</div>
<input class="size-4 text-primary focus:ring-primary border-slate-300 dark:border-slate-600 bg-transparent" name="freq" type="radio"/>
</label>
<label class="flex items-center justify-between p-4 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-400">today</span>
<div>
<p class="text-sm font-medium text-slate-800 dark:text-slate-200">每日汇总</p>
<p class="text-xs text-slate-500">每天定时发送一份摘要报告</p>
</div>
</div>
<input checked="" class="size-4 text-primary focus:ring-primary border-slate-300 dark:border-slate-600 bg-transparent" name="freq" type="radio"/>
</label>
<label class="flex items-center justify-between p-4 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-400">calendar_view_week</span>
<div>
<p class="text-sm font-medium text-slate-800 dark:text-slate-200">每周精选</p>
<p class="text-xs text-slate-500">每周一上午发送上周深度分析</p>
</div>
</div>
<input class="size-4 text-primary focus:ring-primary border-slate-300 dark:border-slate-600 bg-transparent" name="freq" type="radio"/>
</label>
</div>
</section>
<!-- Section 3: Preferred Delivery Time (Conditional) -->
<section class="animate-in fade-in slide-in-from-top-2 duration-500">
<h2 class="text-sm font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-4">投递时间设置</h2>
<div class="flex items-center gap-4 bg-white dark:bg-slate-800/50 p-4 border border-slate-100 dark:border-slate-700 rounded-lg shadow-sm">
<span class="material-symbols-outlined text-slate-400">schedule</span>
<span class="text-sm text-slate-700 dark:text-slate-300 flex-1">汇总报告生成时间</span>
<div class="flex items-center gap-2">
<input class="bg-slate-100 dark:bg-slate-700 border-none rounded-md text-sm font-medium px-3 py-1.5 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/50" type="time" value="18:30"/>
</div>
</div>
<p class="mt-2 text-xs text-slate-400 px-1">仅在选择“每日汇总”或“每周精选”时生效</p>
</section>
<!-- Section 4: Notification Channels -->
<section>
<h2 class="text-sm font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-4">通知渠道</h2>
<div class="grid grid-cols-1 gap-3">
<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-800/50 border border-slate-100 dark:border-slate-700 rounded-lg shadow-sm">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-500">desktop_windows</span>
<span class="text-sm font-medium text-slate-800 dark:text-slate-200">桌面端推送</span>
</div>
<label class="relative flex h-[24px] w-[44px] cursor-pointer items-center rounded-full bg-primary p-0.5 justify-end">
<div class="h-full w-[20px] rounded-full bg-white shadow-sm"></div>
<input checked="" class="hidden" type="checkbox"/>
</label>
</div>
<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-800/50 border border-slate-100 dark:border-slate-700 rounded-lg shadow-sm">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-500">mail</span>
<span class="text-sm font-medium text-slate-800 dark:text-slate-200">电子邮件通知</span>
</div>
<label class="relative flex h-[24px] w-[44px] cursor-pointer items-center rounded-full bg-slate-200 dark:bg-slate-700 p-0.5 justify-start">
<div class="h-full w-[20px] rounded-full bg-white shadow-sm"></div>
<input class="hidden" type="checkbox"/>
</label>
</div>
</div>
</section>
</div>
<!-- Footer / Stats -->
<footer class="px-8 py-4 bg-slate-50/50 dark:bg-slate-900/50 border-t border-slate-200 dark:border-slate-800 flex justify-between items-center text-xs text-slate-400">
<p>上次更新于: 2024-05-20 14:22</p>
<p>已启用 2 个数据源主题</p>
</footer>
</div>
</body></html>
