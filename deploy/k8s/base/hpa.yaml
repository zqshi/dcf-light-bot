apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dcf-light-bot
  namespace: dcf-system
  labels:
    app.kubernetes.io/name: dcf-light-bot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dcf-light-bot
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
