apiVersion: apps/v1
kind: Deployment
metadata:
  name: dcf-light-bot
  namespace: dcf-system
  labels:
    app.kubernetes.io/name: dcf-light-bot
    app.kubernetes.io/part-of: dcf-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: dcf-light-bot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dcf-light-bot
    spec:
      containers:
        - name: app
          image: dcf-light-bot:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: dcf-light-bot-config
            - secretRef:
                name: dcf-light-bot-secret
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
