server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        sub_filter_once on;
        sub_filter_types text/html;
        # Inject BEFORE Element Web's JS bundle so language is set before i18next reads it
        sub_filter '</head>' '<script src="/dcf-matrix-drawer.js"></script></head>';
    }
    location = /welcome.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location = /version {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location = /config.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location ~ ^/config\..+\.json$ {
        try_files /config.json =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location = /dcf-matrix-drawer.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location /lite/ {
        alias /app/lite/;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location /lite-vendor/ {
        alias /app/lite_vendor/;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location /client-suite/ {
        alias /app/client-suite/;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri $uri/ /client-suite/index.html;
    }
    location = /client-suite {
        return 302 /client-suite/;
    }
    location = /lite {
        return 302 /lite/index.html;
    }
    location /config {
        root /tmp/element-web-config;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location /modules {
        alias /modules;
    }
    # ─── WeKnora UI (standalone admin) ───
    location /weknora/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $weknora_upstream http://weknora-ui:80;
        proxy_pass $weknora_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    # Note: /api/weknora/ direct proxy removed — frontend uses /api/control/weknora/*
    # which goes through DCF backend with service-account auth injection.
    error_page   500 502 503 504  /50x.html;
}
