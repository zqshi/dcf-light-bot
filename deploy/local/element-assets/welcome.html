<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>DCF Workspace 登录中</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        display: grid;
        place-items: center;
        background:
          radial-gradient(860px 420px at 8% 8%, rgba(90, 145, 255, 0.32) 0%, transparent 65%),
          radial-gradient(720px 380px at 95% 95%, rgba(50, 197, 175, 0.24) 0%, transparent 66%),
          linear-gradient(145deg, #f8fbff 0%, #eef5ff 52%, #edf8ff 100%);
        color: #0f172a;
      }
      .shell {
        width: min(560px, calc(100vw - 28px));
        border-radius: 22px;
        border: 1px solid #d8e7ff;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 58px rgba(34, 73, 145, 0.15);
        padding: 26px 22px;
        text-align: center;
      }
      .logo {
        width: 52px;
        height: 52px;
        border-radius: 14px;
        margin: 0 auto 10px;
        border: 1px solid #bfd8ff;
        background: #ebf3ff;
        display: grid;
        place-items: center;
        font-weight: 700;
        color: #1f4ca9;
      }
      h1 {
        margin: 0;
        font-size: 24px;
      }
      p {
        margin: 10px 0 0;
        color: #4f6283;
        line-height: 1.75;
        font-size: 14px;
      }
      .spinner {
        width: 28px;
        height: 28px;
        margin: 16px auto 0;
        border-radius: 50%;
        border: 3px solid #d9e6ff;
        border-top-color: #2d6cf0;
        animation: spin .85s linear infinite;
      }
      .btn {
        margin-top: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        border-radius: 11px;
        padding: 0 14px;
        border: 1px solid #c8dbff;
        text-decoration: none;
        color: #1f3f74;
        background: #f4f8ff;
        font-size: 14px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
      (function redirectToSingleLogin() {
        var target = "/#/login";
        if (window.location.hash && window.location.hash.indexOf("#/login") === 0) return;
        setTimeout(function () { window.location.replace(target); }, 120);
      })();
    </script>
  </head>
  <body>
    <section class="shell">
      <div class="logo">DCF</div>
      <h1>正在进入统一登录页</h1>
      <p>系统已预置服务器地址与默认语言，无需手动配置。</p>
      <div class="spinner" aria-hidden="true"></div>
      <a class="btn" href="/#/login">未自动跳转？点击进入</a>
    </section>
  </body>
</html>
