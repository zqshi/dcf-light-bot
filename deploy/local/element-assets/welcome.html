<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>DCF Workspace 登录</title>
    <style>
      :root {
        --bg-a: #f3f8ff;
        --bg-b: #ecf7f6;
        --card: rgba(255, 255, 255, 0.9);
        --line: #d8e5ff;
        --text: #13233a;
        --muted: #62728f;
        --primary: #2368eb;
        --primary-hover: #1d57c4;
        --ok: #15935f;
        --warn: #d48a00;
        --err: #bf2f2f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(900px 500px at 10% 8%, rgba(101, 149, 255, 0.24) 0%, transparent 64%),
          radial-gradient(800px 460px at 92% 92%, rgba(73, 201, 170, 0.21) 0%, transparent 66%),
          linear-gradient(145deg, var(--bg-a) 0%, var(--bg-b) 58%, #eff7ff 100%);
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(980px, 100%);
        min-height: 600px;
        display: grid;
        grid-template-columns: 1.1fr 1fr;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--card);
        backdrop-filter: blur(6px);
        box-shadow: 0 28px 65px rgba(44, 78, 130, 0.15);
        overflow: hidden;
      }
      .hero {
        padding: 42px 38px;
        background:
          linear-gradient(160deg, rgba(255, 255, 255, 0.88) 0%, rgba(246, 250, 255, 0.7) 100%),
          url("/dcf-login-bg.svg") center/cover no-repeat;
        border-right: 1px solid var(--line);
      }
      .hero-logo {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 22px;
        font-weight: 700;
      }
      .hero-logo img {
        width: 46px;
        height: 46px;
        border-radius: 10px;
        border: 1px solid #bdd3ff;
        background: #eaf2ff;
      }
      .hero h1 {
        margin: 30px 0 12px;
        font-size: 36px;
        line-height: 1.25;
      }
      .hero p {
        margin: 0;
        line-height: 1.9;
        color: #39507a;
      }
      .hero ul {
        margin: 26px 0 0;
        padding-left: 18px;
        color: #2c4470;
        line-height: 1.9;
      }
      .auth {
        padding: 34px 34px 28px;
        display: flex;
        flex-direction: column;
      }
      .auth-title {
        font-size: 28px;
        font-weight: 700;
        margin: 0;
      }
      .auth-sub {
        margin: 8px 0 22px;
        color: var(--muted);
        font-size: 14px;
      }
      .tabs {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 4px;
        background: #f6f9ff;
      }
      .tab {
        border: 0;
        border-radius: 9px;
        min-height: 38px;
        font-size: 14px;
        background: transparent;
        color: #365183;
        cursor: pointer;
      }
      .tab.active {
        background: #fff;
        color: #19439a;
        box-shadow: 0 1px 6px rgba(38, 78, 150, 0.16);
        font-weight: 600;
      }
      .panel {
        margin-top: 18px;
        display: none;
      }
      .panel.active {
        display: block;
      }
      .field {
        margin-bottom: 12px;
      }
      .field label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: #3c537f;
      }
      .field input {
        width: 100%;
        min-height: 42px;
        border-radius: 10px;
        border: 1px solid #c9d8f8;
        outline: 0;
        font-size: 15px;
        padding: 0 12px;
        background: #fff;
      }
      .field input:focus {
        border-color: #4f89f5;
        box-shadow: 0 0 0 3px rgba(79, 137, 245, 0.14);
      }
      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }
      .btn {
        border: 0;
        min-height: 44px;
        border-radius: 10px;
        cursor: pointer;
        padding: 0 14px;
        font-size: 14px;
      }
      .btn.primary {
        background: var(--primary);
        color: #fff;
      }
      .btn.primary:hover { background: var(--primary-hover); }
      .btn.ghost {
        background: #eef4ff;
        color: #204a95;
        border: 1px solid #bfd4ff;
      }
      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .status {
        min-height: 20px;
        margin-top: 8px;
        font-size: 13px;
      }
      .status.ok { color: var(--ok); }
      .status.warn { color: var(--warn); }
      .status.err { color: var(--err); }
      .footnote {
        margin-top: auto;
        padding-top: 14px;
        color: #6f7f9b;
        font-size: 12px;
        line-height: 1.7;
      }
      @media (max-width: 980px) {
        .card {
          grid-template-columns: 1fr;
          min-height: auto;
        }
        .hero {
          border-right: 0;
          border-bottom: 1px solid var(--line);
          padding: 24px;
        }
        .hero h1 { font-size: 29px; margin-top: 20px; }
      }
      @media (max-width: 560px) {
        .wrap { padding: 10px; }
        .auth { padding: 20px 16px; }
        .hero { padding: 20px 16px; }
        .tabs { grid-template-columns: 1fr; gap: 4px; }
        .row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <aside class="hero">
          <div class="hero-logo">
            <img src="/dcf-login-logo.svg" alt="DCF" />
            <span>DCF Workspace</span>
          </div>
          <h1>企业数字员工协作入口</h1>
          <p>
            服务器、语言、通道均已预配置。登录后可直接与数字员工会话，
            无需用户手动配置 API Key。
          </p>
          <ul>
            <li>账号密码登录：适用于日常内部用户</li>
            <li>手机号验证码：短信网关配置后直接可用</li>
            <li>企业 SSO：对接统一身份系统</li>
          </ul>
        </aside>
        <section class="auth">
          <h2 class="auth-title">登录系统</h2>
          <p class="auth-sub">默认简体中文，统一登录入口。</p>

          <nav class="tabs" aria-label="登录方式">
            <button class="tab active" data-tab="account">账号密码</button>
            <button class="tab" data-tab="phone">手机号验证码</button>
            <button class="tab" data-tab="sso">企业 SSO</button>
          </nav>

          <section class="panel active" data-panel="account">
            <div class="field">
              <label for="username">账号</label>
              <input id="username" autocomplete="username" placeholder="@alice:localhost 或 alice" />
            </div>
            <div class="field">
              <label for="password">密码</label>
              <input id="password" type="password" autocomplete="current-password" placeholder="请输入密码" />
            </div>
            <button id="accountLoginBtn" class="btn primary">登录并进入会话</button>
            <div id="accountStatus" class="status" role="status" aria-live="polite"></div>
          </section>

          <section class="panel" data-panel="phone">
            <div class="field">
              <label for="mobile">手机号</label>
              <input id="mobile" autocomplete="tel" placeholder="请输入中国大陆手机号" />
            </div>
            <div class="field row">
              <div>
                <label for="smsCode">短信验证码</label>
                <input id="smsCode" inputmode="numeric" placeholder="请输入验证码" />
              </div>
              <button id="sendSmsBtn" class="btn ghost">获取验证码</button>
            </div>
            <button id="phoneLoginBtn" class="btn primary">验证并登录</button>
            <div id="phoneStatus" class="status" role="status" aria-live="polite"></div>
          </section>

          <section class="panel" data-panel="sso">
            <p class="auth-sub">跳转企业统一身份认证完成登录。</p>
            <button id="ssoBtn" class="btn primary">使用企业 SSO 登录</button>
            <div id="ssoStatus" class="status" role="status" aria-live="polite"></div>
          </section>

          <p class="footnote">
            如遇登录问题，请联系管理员检查账号状态、短信网关配置和企业 SSO 配置。
          </p>
        </section>
      </section>
    </main>

    <script>
      (function () {
        var state = {
          hsUrl: "http://127.0.0.1:8008",
          serverName: "localhost",
          smsEnabled: false,
          smsSendUrl: "",
          smsVerifyLoginUrl: "",
          ssoUrl: ""
        };

        function normalizeUser(username) {
          var raw = String(username || "").trim();
          if (!raw) return "";
          if (raw.indexOf("@") === 0 && raw.indexOf(":") > 0) return raw;
          return "@" + raw + ":" + state.serverName;
        }

        function setStatus(node, type, text) {
          node.className = "status " + (type || "");
          node.textContent = text || "";
        }

        function setButtonLoading(btn, loading, text) {
          if (!btn) return;
          if (!btn.dataset.defaultText) btn.dataset.defaultText = btn.textContent;
          btn.disabled = loading;
          btn.textContent = loading ? (text || "处理中...") : btn.dataset.defaultText;
        }

        function loadConfig() {
          return fetch("/config.json", { cache: "no-store" })
            .then(function (r) { return r.ok ? r.json() : {}; })
            .then(function (cfg) {
              var hs = cfg && cfg.default_server_config && cfg.default_server_config["m.homeserver"];
              if (hs && hs.base_url) state.hsUrl = String(hs.base_url);
              if (hs && hs.server_name) state.serverName = String(hs.server_name);
              if (cfg && cfg.default_server_name) state.serverName = String(cfg.default_server_name);
              var dcf = (cfg && cfg.dcf_login) || {};
              state.smsEnabled = Boolean(dcf.sms_enabled);
              state.smsSendUrl = String(dcf.sms_send_url || "");
              state.smsVerifyLoginUrl = String(dcf.sms_verify_login_url || "");
              state.ssoUrl = String(dcf.sso_url || "");
            })
            .catch(function () {});
        }

        function persistMatrixSession(payload) {
          var token = payload && payload.access_token;
          var userId = payload && payload.user_id;
          if (!token || !userId) throw new Error("登录响应异常");
          localStorage.removeItem("mx_access_token");
          localStorage.removeItem("mx_user_id");
          localStorage.removeItem("mx_device_id");
          localStorage.setItem("mx_access_token", token);
          localStorage.setItem("mx_user_id", userId);
          if (payload.device_id) localStorage.setItem("mx_device_id", payload.device_id);
          localStorage.setItem("mx_hs_url", state.hsUrl);
          localStorage.setItem("mx_is_guest", "false");
        }

        function goToApp() {
          window.location.replace("/#/home");
        }

        function normalizeBrokenRoomRoute() {
          if (window.location.hash === "#/room" || window.location.hash === "#/room/") {
            window.location.replace("/#/home");
          }
        }

        function switchTab(tabName) {
          document.querySelectorAll(".tab").forEach(function (btn) {
            btn.classList.toggle("active", btn.dataset.tab === tabName);
          });
          document.querySelectorAll(".panel").forEach(function (panel) {
            panel.classList.toggle("active", panel.dataset.panel === tabName);
          });
        }

        function requestPasswordLogin(username, password) {
          var identifier = username.indexOf("@") === 0
            ? { type: "m.id.user", user: username.slice(1).split(":")[0] }
            : { type: "m.id.user", user: username };
          return fetch(state.hsUrl + "/_matrix/client/v3/login", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              type: "m.login.password",
              identifier: identifier,
              user: identifier.user,
              password: password
            })
          }).then(function (r) {
            return r.json().then(function (d) {
              if (!r.ok) {
                throw new Error((d && (d.error || d.errcode)) || "账号或密码错误");
              }
              return d;
            });
          });
        }

        function bindEvents() {
          var accountStatus = document.getElementById("accountStatus");
          var phoneStatus = document.getElementById("phoneStatus");
          var ssoStatus = document.getElementById("ssoStatus");
          var accountBtn = document.getElementById("accountLoginBtn");
          var sendSmsBtn = document.getElementById("sendSmsBtn");
          var phoneBtn = document.getElementById("phoneLoginBtn");
          var ssoBtn = document.getElementById("ssoBtn");

          document.querySelectorAll(".tab").forEach(function (btn) {
            btn.addEventListener("click", function () { switchTab(btn.dataset.tab); });
          });

          accountBtn.addEventListener("click", function () {
            var usernameRaw = document.getElementById("username").value;
            var password = document.getElementById("password").value;
            var username = String(usernameRaw || "").trim();
            if (!username || !password) {
              setStatus(accountStatus, "warn", "请输入账号和密码。");
              return;
            }
            setStatus(accountStatus, "", "");
            setButtonLoading(accountBtn, true, "登录中...");
            requestPasswordLogin(username, password)
              .then(function (payload) {
                persistMatrixSession(payload);
                setStatus(accountStatus, "ok", "登录成功，正在进入会话...");
                setTimeout(goToApp, 220);
              })
              .catch(function (err) {
                setStatus(accountStatus, "err", err.message || "登录失败");
              })
              .finally(function () {
                setButtonLoading(accountBtn, false);
              });
          });

          sendSmsBtn.addEventListener("click", function () {
            var mobile = String(document.getElementById("mobile").value || "").trim();
            if (!/^1\d{10}$/.test(mobile)) {
              setStatus(phoneStatus, "warn", "请输入有效手机号。");
              return;
            }
            if (!state.smsEnabled || !state.smsSendUrl) {
              setStatus(phoneStatus, "warn", "短信网关未配置，暂无法发送验证码。");
              return;
            }
            setButtonLoading(sendSmsBtn, true, "发送中...");
            setStatus(phoneStatus, "", "");
            fetch(state.smsSendUrl, {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({ mobile: mobile })
            }).then(function (r) {
              return r.json().catch(function () { return {}; }).then(function (d) {
                if (!r.ok) throw new Error((d && (d.message || d.error)) || "验证码发送失败");
                setStatus(phoneStatus, "ok", "验证码已发送，请注意查收。");
              });
            }).catch(function (err) {
              setStatus(phoneStatus, "err", err.message || "验证码发送失败");
            }).finally(function () {
              setButtonLoading(sendSmsBtn, false);
            });
          });

          phoneBtn.addEventListener("click", function () {
            var mobile = String(document.getElementById("mobile").value || "").trim();
            var code = String(document.getElementById("smsCode").value || "").trim();
            if (!/^1\d{10}$/.test(mobile) || !/^\d{4,8}$/.test(code)) {
              setStatus(phoneStatus, "warn", "请输入手机号和验证码。");
              return;
            }
            if (!state.smsEnabled || !state.smsVerifyLoginUrl) {
              setStatus(phoneStatus, "warn", "短信网关未配置，暂不支持验证码登录。");
              return;
            }
            setButtonLoading(phoneBtn, true, "验证中...");
            setStatus(phoneStatus, "", "");
            fetch(state.smsVerifyLoginUrl, {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({ mobile: mobile, code: code })
            }).then(function (r) {
              return r.json().then(function (d) {
                if (!r.ok) throw new Error((d && (d.message || d.error)) || "验证码登录失败");
                persistMatrixSession(d);
                setStatus(phoneStatus, "ok", "登录成功，正在进入会话...");
                setTimeout(goToApp, 220);
              });
            }).catch(function (err) {
              setStatus(phoneStatus, "err", err.message || "验证码登录失败");
            }).finally(function () {
              setButtonLoading(phoneBtn, false);
            });
          });

          ssoBtn.addEventListener("click", function () {
            setStatus(ssoStatus, "", "");
            setButtonLoading(ssoBtn, true, "跳转中...");
            var ssoUrl = state.ssoUrl
              ? state.ssoUrl
              : state.hsUrl + "/_matrix/client/v3/login/sso/redirect?redirectUrl=" + encodeURIComponent(window.location.origin + "/#/home");
            setStatus(ssoStatus, "ok", "正在跳转到企业身份认证...");
            window.location.href = ssoUrl;
          });

          // Do not auto-enter room client from stale local storage session.
          // User must explicitly login to avoid accidental bot-account reuse.
        }

        normalizeBrokenRoomRoute();
        loadConfig().then(bindEvents);
      })();
    </script>
  </body>
</html>
