services:
  matrix-synapse:
    image: matrixdotorg/synapse:latest
    container_name: dcf-matrix-synapse
    restart: unless-stopped
    ports:
      - "8008:8008"
    volumes:
      - ../../runtime/matrix/data:/data
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    networks:
      - dcf-network

  openclaw-gateway:
    image: openclaw:local
    container_name: dcf-openclaw-gateway
    depends_on:
      - matrix-synapse
    restart: unless-stopped
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-dcf-local-token}
    volumes:
      - ../../runtime/openclaw/config:/home/node/.openclaw
      - ../../runtime/openclaw/workspace:/home/node/.openclaw/workspace
    ports:
      - "18789:18789"
      - "18790:18790"
    init: true
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--allow-unconfigured",
        "--bind",
        "lan",
        "--port",
        "18789"
      ]
    networks:
      - dcf-network

  matrix-element-web:
    image: vectorim/element-web:v1.12.11
    container_name: dcf-matrix-element-web
    depends_on:
      - matrix-synapse
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./element-web-config.json:/app/config.json:ro
      - ./element-assets/dcf-login-logo.svg:/app/dcf-login-logo.svg:ro
      - ./element-assets/dcf-login-bg.svg:/app/dcf-login-bg.svg:ro
      - ./element-assets/welcome.html:/app/welcome.html:ro
      - ./element-assets/dcf-matrix-drawer.js:/app/dcf-matrix-drawer.js:ro
      - ./element-assets/nginx-default.conf:/etc/nginx/templates/default.conf.template:ro
      - ../../src/interfaces/http/lite-ui:/app/lite:ro
      - ../../node_modules/matrix-js-sdk/dist:/app/lite_vendor:ro
      - ../../client-suite/apps/web/dist:/app/client-suite:ro
    networks:
      - dcf-network

  # ─── WeKnora RAG Services ──────────────────────────────────────────
  # TODO: 投产前验证镜像名 — 运行 docker pull 确认以下镜像存在
  #       若 WeKnora 官方镜像名不同，需同步修改此处和 nginx 反代
  weknora-pg:
    image: pgvector/pgvector:pg16
    container_name: dcf-weknora-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${WEKNORA_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${WEKNORA_DB_PASSWORD:-postgres123}
      POSTGRES_DB: ${WEKNORA_DB_NAME:-weknora}
    volumes:
      - weknora-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WEKNORA_DB_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - dcf-network

  weknora-redis:
    image: redis:7-alpine
    container_name: dcf-weknora-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - dcf-network

  weknora-docreader:
    image: wechatopenai/weknora-docreader:latest
    container_name: dcf-weknora-docreader
    restart: unless-stopped
    networks:
      - dcf-network

  weknora-app:
    image: wechatopenai/weknora-app:latest
    container_name: dcf-weknora-app
    restart: unless-stopped
    depends_on:
      weknora-pg:
        condition: service_healthy
      weknora-redis:
        condition: service_healthy
      weknora-docreader:
        condition: service_started
    ports:
      - "${WEKNORA_FRONTEND_PORT:-19000}:8080"
    environment:
      DB_HOST: weknora-pg
      DB_PORT: 5432
      DB_USER: ${WEKNORA_DB_USER:-postgres}
      DB_PASSWORD: ${WEKNORA_DB_PASSWORD:-postgres123}
      DB_NAME: ${WEKNORA_DB_NAME:-weknora}
      REDIS_HOST: weknora-redis
      REDIS_PORT: 6379
      DOC_READER_ADDR: weknora-docreader:50051
      JWT_SECRET: ${WEKNORA_JWT_SECRET:-weknora-jwt-secret}
      STORAGE_TYPE: ${WEKNORA_STORAGE_TYPE:-local}
      LLM_BASE_URL: ${WEKNORA_LLM_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - weknora-storage:/data
    networks:
      - dcf-network

  weknora-ui:
    image: wechatopenai/weknora-ui:latest
    container_name: dcf-weknora-ui
    restart: unless-stopped
    depends_on:
      - weknora-app
    ports:
      - "19001:80"
    networks:
      - dcf-network

networks:
  dcf-network:
    driver: bridge

volumes:
  weknora-pg-data:
  weknora-storage:
