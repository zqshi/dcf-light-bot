namespace:
  name: dcf-system

image:
  tag: stable
  pullPolicy: IfNotPresent

replicaCount: 3

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  cpuAverageUtilization: 65
  memoryAverageUtilization: 70

pdb:
  minAvailable: 2

ingress:
  hosts:
    - host: dcf.prod.company.internal
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: dcf-light-bot-tls
      hosts:
        - dcf.prod.company.internal

secrets:
  create: false
  name: dcf-light-bot-secret
  data: null

config:
  AUDIT_RETENTION_TTL_DAYS: "90"
  AUDIT_RETENTION_MAX_ROWS: "20000"
  AUDIT_ARCHIVE_MAX_ROWS: "100000"
  ASSET_REVIEW_SLA_HOURS: "24"
  METRICS_REFRESH_INTERVAL_MS: "60000"
