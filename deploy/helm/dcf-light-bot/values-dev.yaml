namespace:
  name: dcf-system-dev

image:
  tag: dev

replicaCount: 1

ingress:
  hosts:
    - host: dcf-dev.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: dcf-light-bot-dev-tls
      hosts:
        - dcf-dev.example.com

hpa:
  enabled: false

networkPolicy:
  ingress:
    allowedNamespaces:
      - ingress-nginx
      - dcf-system-dev

config:
  PLATFORM_BASE_URL: "https://dcf-dev.example.com"
  KUBERNETES_NAMESPACE_PREFIX: "dcf-dev"
  AUDIT_RETENTION_TTL_DAYS: "7"
  ASSET_REVIEW_SLA_HOURS: "8"
  METRICS_REFRESH_INTERVAL_MS: "30000"
