apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dcf-light-bot.fullname" . }}-config
  namespace: {{ include "dcf-light-bot.namespace" . }}
  labels:
    {{- include "dcf-light-bot.labels" . | nindent 4 }}
data:
{{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
